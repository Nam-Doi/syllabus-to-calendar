version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: syllabus_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${DOCKER_IMAGE_BACKEND:-syllabus-backend:latest}
    container_name: syllabus_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: ./backend/.env
    environment:
      DATABASE_HOSTNAME: db
      DATABASE_PORT: 5432
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    image: ${DOCKER_IMAGE_FRONTEND:-syllabus-frontend:latest}
    container_name: syllabus_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  uploads_data:
